name: dermasight

services:
    postgres:
        image: postgres:16-alpine
        container_name: dermasight-postgres
        restart: unless-stopped
        volumes:
            - pgdata:/var/lib/postgresql/data
        environment:
            POSTGRES_USER: ${DB_USER}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
            POSTGRES_DB: ${DB_NAME}
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d postgres"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - dermasight-net

    backend-seed:
        image: postgres:16-alpine
        container_name: dermasight-seed
        restart: "no"
        command: >
            sh -c "
              psql postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/postgres \
                -c 'CREATE DATABASE ${DB_NAME}' 2>/dev/null || echo 'Database already exists'
            "
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - dermasight-net

    model-api:
        image: ghcr.io/dermasight/dermasight-research-model-2:latest
        container_name: dermasight-model
        restart: unless-stopped
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:8000/health"
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 60s
        networks:
            - dermasight-net

    backend-migrate:
        image: ghcr.io/dermasight/dermasight-backend:latest
        container_name: dermasight-migrate
        restart: "no"
        command: >
            sh -c "bunx prisma migrate deploy --schema=prisma/schema"
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_NAME: ${DB_NAME}
        depends_on:
            backend-seed:
                condition: service_completed_successfully
        networks:
            - dermasight-net

    backend-seed-admin:
        image: ghcr.io/dermasight/dermasight-backend:latest
        container_name: dermasight-seed-admin
        restart: "no"
        command: ["bun", "run", "src/utils/seed.ts"]
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_NAME: ${DB_NAME}
            SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
            SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD}
            SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME}
        depends_on:
            backend-migrate:
                condition: service_completed_successfully
        networks:
            - dermasight-net

    backend:
        image: ghcr.io/dermasight/dermasight-backend:latest
        container_name: dermasight-backend
        restart: unless-stopped
        ports:
            - "${PORT:-5000}:5000"
        environment:
            HOST: "0.0.0.0"
            PORT: 5000
            DB_HOST: postgres
            DB_PORT: 5432
            DB_USER: ${DB_USER}
            DB_PASSWORD: ${DB_PASSWORD}
            DB_NAME: ${DB_NAME}
            MODEL_API_URL: http://model-api:8000
            API_PREFIX: ${API_PREFIX:-/api}
            COOKIE_SECRET: ${COOKIE_SECRET}
            PASETO_SECRET_KEY: ${PASETO_SECRET_KEY}
            ENVIRONMENT: ${ENVIRONMENT:-production}
            CORS_ORIGINS: ${CORS_ORIGINS}
            R2_STORAGE_URL: ${R2_STORAGE_URL}
            R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
            R2_BUCKET_NAME: ${R2_BUCKET_NAME}
            R2_REGION: ${R2_REGION:-auto}
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASS: ${SMTP_PASS}
            CONTACT_EMAIL: ${CONTACT_EMAIL}
            CONTACT_FROM_EMAIL: ${CONTACT_FROM_EMAIL}
        depends_on:
            backend-seed-admin:
                condition: service_completed_successfully
            model-api:
                condition: service_started
        healthcheck:
            test:
                [
                    "CMD",
                    "wget",
                    "--no-verbose",
                    "--tries=1",
                    "--spider",
                    "http://localhost:5000/api/health"
                ]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s
        networks:
            - dermasight-net

volumes:
    pgdata:
        name: dermasight-pgdata

networks:
    dermasight-net:
        name: dermasight-net
        driver: bridge
